{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <title>رسائل الجندي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/gps.js' %}"></script>
    <script src="{% static 'js/gesture.js' %}"></script>
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">📩 رسائلك</h2>

    <a href="/soldier/location/" class="btn btn-primary w-100 mb-3">📍 فتح نظام GPS</a>

    <ul class="list-group">
        {% for m in messages %}
        <li class="list-group-item">
            من: {{ m.sender.username }} — المنطقة: {{ m.zone.name }} — {{ m.sent_at }}
        </li>
        {% empty %}
        <li class="list-group-item text-muted">لا توجد رسائل</li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
