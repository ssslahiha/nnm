{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <title>إرسال رسالة مشفرة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/gps.js' %}"></script>
    <script src="{% static 'js/gesture.js' %}"></script>
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">✉️ إرسال رسالة مشفرة</h2>

    <form method="POST">
        {% csrf_token %}

        <label>اختر الجندي</label>
        <select name="receiver" class="form-control mb-3">
            {% for s in soldiers %}
            <option value="{{ s.id }}">{{ s.username }}</option>
            {% endfor %}
        </select>

        <label>اختر المنطقة الأمنية</label>
        <select name="zone" class="form-control mb-3">
            {% for z in zones %}
            <option value="{{ z.id }}">{{ z.name }}</option>
            {% endfor %}
        </select>

        <label>مدة صلاحية الرسالة (بالدقائق)</label>
        <input name="duration" class="form-control mb-3" value="5">

        <label>نص الرسالة</label>
        <textarea name="message" class="form-control mb-3" required></textarea>

        <button class="btn btn-success w-100">إرسال</button>
    </form>

</div>

</body>
</html>
