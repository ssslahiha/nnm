{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <title>نظام GPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/gps.js' %}"></script>
    <script src="{% static 'js/gesture.js' %}"></script>
</head>

<body class="bg-dark text-white">

<div class="container mt-4 text-center">

    <h2 class="mb-4">📍 نظام تحديد الموقع</h2>

    <p id="status">جاري تحديد موقعك...</p>

    <div id="message-box" class="alert alert-info mt-4 d-none"></div>

</div>

<script>
function checkLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
        fetch("/check-location/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "inside") {
                document.getElementById("message-box").classList.remove("d-none");
                document.getElementById("message-box").innerHTML =
                    "<b>📨 رسالة:</b><br>" + data.message;
            }
        });
    });
}

setInterval(checkLocation, 5000);
</script>

</body>
</html>
