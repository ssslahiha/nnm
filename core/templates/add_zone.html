{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <title>إضافة منطقة أمنية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/gps.js' %}"></script>
    <script src="{% static 'js/gesture.js' %}"></script>
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">➕ إضافة منطقة أمنية</h2>

    <form method="POST">
        {% csrf_token %}

        <label>اسم المنطقة</label>
        <input name="name" class="form-control mb-3" required>

        <label>وصف المهمة</label>
        <textarea name="description" class="form-control mb-3"></textarea>

        <label>خط العرض</label>
        <input name="latitude" class="form-control mb-3" required>

        <label>خط الطول</label>
        <input name="longitude" class="form-control mb-3" required>

        <label>نطاق الأمان (متر)</label>
        <input name="radius" class="form-control mb-3" value="100" required>

        <button class="btn btn-primary w-100">حفظ</button>
    </form>

</div>

</body>
</html>
